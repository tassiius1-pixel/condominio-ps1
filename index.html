<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Condomínio Porto Seguro 1</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>


  <!-- Import Map -->
  <script type="importmap">
  {
    "imports": {
      "react/": "https://aistudiocdn.com/react@^19.2.0/",
      "react": "https://aistudiocdn.com/react@^19.2.0",
      "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
      "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1"
    }
  }
  </script>
</head>

<body class="bg-gray-100">
  <div id="root">
    <!-- Spinner inicial ultra-leve para evitar tela branca -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);">
      <div style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
      <p style="margin-top: 16px; font-size: 11px; font-weight: 800; color: #4f46e5; letter-spacing: 0.15em; text-transform: uppercase;">Carregando...</p>
    </div>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </div>
  <script type="module" src="/index.tsx"></script>

  <!-- =============================== -->
  <!-- 🔥 REGISTRO DO SERVICE WORKER FCM -->
  <!-- =============================== -->
  <script>
    if ("serviceWorker" in navigator) {
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      // Verifica se o app está instalado (modo standalone)
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      // Se for iOS e NÃO estiver instalado (estiver no navegador Safari), remove o SW para evitar bugs
      if (isIOS && !isStandalone) {
        console.log("iOS no navegador detectado: Desativando SW para evitar conflitos.");
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      } else if (typeof Notification !== "undefined") {
        // Registra se for Android, Desktop OU iOS Instalado (Standalone)
        navigator.serviceWorker
          .register("/sw-sos-v1.js?v=1.5")
          .then((reg) => {
            console.log("SW SOS registrado (PWA):", reg);

            // Verifica atualizações
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              if (installingWorker) {
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log("Nova versão detectada. Atualizando...");
                    // No sw-sos-v1.js o skipWaiting() já é chamado, 
                    // então o controllerchange vai disparar abaixo.
                  }
                };
              }
            };
          })
          .catch((err) => console.error("Erro ao registrar SW SOS:", err));

        // Recarrega a página automaticamente quando o novo SW assume o controle
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            console.log("Service Worker atualizado. Recarregando página...");
            window.location.reload();
          }
        });
      }
    }
  </script>

</body>

</html>
