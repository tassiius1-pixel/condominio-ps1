<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>Condomínio Porto Seguro 1</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Desativa Cache HTTP do index.html -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>


  <!-- Import Map -->
  <script type="importmap">
  {
    "imports": {
      "react/": "https://aistudiocdn.com/react@^19.2.0/",
      "react": "https://aistudiocdn.com/react@^19.2.0",
      "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
      "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1"
    }
  }
  </script>
</head>

<body class="bg-gray-100">
  <div id="root">
    <!-- Spinner inicial premium unificado -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
        <div style="width: 64px; height: 64px; background-color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 0px; box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.15); border: 1px solid #f1f5f9; animation: bounce 1s infinite alternate; overflow: hidden;">
          <img id="loader-logo" src="/favicon.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; transform: scale(1.2) translateX(3.2px);" />
        </div>
        <h2 style="margin: 0; margin-top: 8px; font-size: 20px; font-weight: 700; font-family: 'Outfit', sans-serif; color: #0f172a; letter-spacing: -0.025em;">Porto Seguro 1</h2>
        <p style="margin: 0; font-size: 11px; font-weight: 800; color: #64748b; letter-spacing: 0.15em; text-transform: uppercase; animation: pulse 1.5s infinite;">Carregando...</p>
      </div>
    </div>
    <script>
      try {
        const savedLogo = localStorage.getItem("condo-logo");
        if (savedLogo) {
          document.getElementById("loader-logo").src = savedLogo;
        }
      } catch (e) {
        console.error(e);
      }
    </script>
    <style>
      @keyframes bounce {
        0% { transform: translateY(0); }
        100% { transform: translateY(-8px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
    </style>
  </div>
  <script type="module" src="/index.tsx"></script>

  <!-- =============================== -->
  <!-- 🔥 REGISTRO DO SERVICE WORKER FCM -->
  <!-- =============================== -->
  <script>
    // 🔥 Varre e desregistra especificamente o Service Worker antigo (sw-sos-v1.js)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        let hasV1 = false;
        for (let registration of registrations) {
          const scriptURL = registration.active?.scriptURL || registration.installing?.scriptURL || registration.waiting?.scriptURL || "";
          if (scriptURL.includes("sw-sos-v1.js")) {
            hasV1 = true;
            registration.unregister().then((ok) => {
              if (ok) console.log("🧹 [PWA] Service Worker antigo (v1) desregistrado:", scriptURL);
            });
          }
        }
        if (hasV1) {
          console.log("🧹 [PWA] Service Worker v1 detectado e desregistrado. Limpando caches e recarregando...");
          if ("caches" in window) {
            caches.keys().then((keys) => {
              keys.forEach((key) => caches.delete(key));
            });
          }
          setTimeout(() => window.location.reload(), 300);
        }
      });
    }

    // Registro do novo Service Worker v2
    const SW_CLEAN_KEY = "sw-cleaned-v2.4";
    if (!localStorage.getItem(SW_CLEAN_KEY)) {
      if ("caches" in window) {
        caches.keys().then((keys) => {
          keys.forEach((key) => caches.delete(key));
        });
      }
      localStorage.setItem(SW_CLEAN_KEY, "true");
      setTimeout(() => window.location.reload(), 300);
    }

    if ("serviceWorker" in navigator && localStorage.getItem(SW_CLEAN_KEY)) {
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      if (isIOS && !isStandalone) {
        console.log("iOS no navegador detectado: Desativando SW para evitar conflitos.");
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      } else if (typeof Notification !== "undefined") {
        navigator.serviceWorker
          .register("/sw-sos-v2.js?v=2.1")
          .then((reg) => {
            console.log("SW SOS registrado (PWA v2.1):", reg);
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              if (installingWorker) {
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log("Nova versão v2.1 detectada. Atualizando...");
                  }
                };
              }
            };
          })
          .catch((err) => console.error("Erro ao registrar SW SOS v2.1:", err));

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            console.log("Service Worker atualizado. Recarregando página...");
            window.location.reload();
          }
        });
      }
    }
  </script>

</body>

</html>
